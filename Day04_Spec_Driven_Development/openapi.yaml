openapi: 3.0.0

info:
  title: Projects API
  version: 1.0.0
  description: API for managing projects and tasks.

paths:
  /projects:
    get:
      summary: Get all projects
      responses:
        '200':
          description: List of projects retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Invalid project data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}:
    get:
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}/status:
    patch:
      summary: Update project status
      parameters:
        - name: id
          in: path
          required: true
          description: Project ID
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - Planned
                    - In Progress
                    - Completed

      responses:
        '200':
          description: Project status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    Project:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: integer
          example: 1

        name:
          type: string
          example: Website Redesign

        description:
          type: string
          nullable: true
          example: Redesign the company website

        status:
          type: string
          enum:
            - Planned
            - In Progress
            - Completed

        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    Task:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          example: 101

        title:
          type: string
          example: Design Homepage

        completed:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 404

        message:
          type: string
          example: Project not found